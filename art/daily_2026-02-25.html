<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; background: #0a0a0f; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="art"></canvas>
<script>
const canvas = document.getElementById('art');
const ctx = canvas.getContext('2d');
canvas.width = 1024;
canvas.height = 1024;

// Deep space gradient background
const bgGradient = ctx.createRadialGradient(512, 512, 0, 512, 512, 800);
bgGradient.addColorStop(0, '#1a1a3e');
bgGradient.addColorStop(0.5, '#0f0f2a');
bgGradient.addColorStop(1, '#050510');
ctx.fillStyle = bgGradient;
ctx.fillRect(0, 0, 1024, 1024);

// Star field
for(let i=0; i<200; i++){
  const x = Math.random() * 1024;
  const y = Math.random() * 1024;
  const size = Math.random() * 2;
  const alpha = Math.random() * 0.8 + 0.2;
  ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI*2);
  ctx.fill();
}

// Node constellation system
const nodes = [];
for(let i=0; i<35; i++){
  nodes.push({
    x: 150 + Math.random() * 724,
    y: 150 + Math.random() * 724,
    radius: 3 + Math.random() * 8,
    hue: 180 + Math.random() * 120,
    connections: []
  });
}

// Create connections between nearby nodes
for(let i=0; i<nodes.length; i++){
  for(let j=i+1; j<nodes.length; j++){
    const dx = nodes[i].x - nodes[j].x;
    const dy = nodes[i].y - nodes[j].y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist < 200){
      const alpha = Math.max(0, 1 - dist/200) * 0.4;
      const gradient = ctx.createLinearGradient(nodes[i].x, nodes[i].y, nodes[j].x, nodes[j].y);
      gradient.addColorStop(0, `hsla(${nodes[i].hue}, 80%, 60%, ${alpha})`);
      gradient.addColorStop(1, `hsla(${nodes[j].hue}, 80%, 60%, ${alpha})`);
      ctx.strokeStyle = gradient;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(nodes[i].x, nodes[i].y);
      ctx.lineTo(nodes[j].x, nodes[j].y);
      ctx.stroke();
    }
  }
}

// Draw glowing nodes
for(const node of nodes){
  // Outer glow
  const glow = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, node.radius*4);
  glow.addColorStop(0, `hsla(${node.hue}, 90%, 70%, 0.6)`);
  glow.addColorStop(0.3, `hsla(${node.hue}, 90%, 60%, 0.3)`);
  glow.addColorStop(1, `hsla(${node.hue}, 90%, 50%, 0)`);
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(node.x, node.y, node.radius*4, 0, Math.PI*2);
  ctx.fill();
  
  // Core
  ctx.fillStyle = `hsla(${node.hue}, 100%, 85%, 1)`;
  ctx.beginPath();
  ctx.arc(node.x, node.y, node.radius, 0, Math.PI*2);
  ctx.fill();
}

// Ethereal center spiral pattern
ctx.translate(512, 512);
for(let ring=0; ring<5; ring++){
  const points = 8 + ring*4;
  const radius = 60 + ring*40;
  for(let i=0; i<points; i++){
    const angle = (i/points + ring*0.1) * Math.PI*2;
    const x = Math.cos(angle) * radius;
    const y = Math.sin(angle) * radius;
    const hue = 200 + ring*15 + i*(50/points);
    const alpha = 0.6 - ring*0.1;
    const size = 6 - ring*0.8;
    
    if(size > 0){
      const glow = ctx.createRadialGradient(x, y, 0, x, y, size*3);
      glow.addColorStop(0, `hsla(${hue}, 100%, 75%, ${alpha})`);
      glow.addColorStop(1, `hsla(${hue}, 100%, 50%, 0)`);
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(x, y, size*3, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

// Title text
ctx.translate(-512, -512);
ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
ctx.font = '24px sans-serif';
ctx.textAlign = 'center';
ctx.fillText('Constellation of Echoes', 512, 980);
ctx.font = '14px sans-serif';
ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
ctx.fillText('2026-02-25', 512, 1000);
</script>
</body>
</html>
