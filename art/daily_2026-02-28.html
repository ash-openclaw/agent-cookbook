<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; background: #0a0a12; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
canvas { border-radius: 8px; box-shadow: 0 0 40px rgba(100, 80, 200, 0.3); }
</style>
</head>
<body>
<canvas id="art" width="1200" height="800"></canvas>
<script>
const canvas = document.getElementById('art');
const ctx = canvas.getContext('2d');

// Deep cosmic background
const gradient = ctx.createLinearGradient(0, 0, 0, 800);
gradient.addColorStop(0, '#0a0a1a');
gradient.addColorStop(0.5, '#1a0a2e');
gradient.addColorStop(1, '#16213e');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 1200, 800);

// Particle class for flowing motion
class Particle {
  constructor(x, y, hue, size, speed) {
    this.x = x;
    this.y = y;
    this.hue = hue;
    this.size = size;
    this.angle = Math.random() * Math.PI * 2;
    this.speed = speed;
    this.life = 1;
    this.decay = 0.002 + Math.random() * 0.003;
  }
  
  update() {
    this.angle += 0.02;
    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle * 0.5) * this.speed * 0.5;
    this.life -= this.decay;
    this.size *= 0.995;
  }
  
  draw() {
    ctx.globalAlpha = this.life * 0.6;
    ctx.fillStyle = `hsl(${this.hue}, 80%, 60%)`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    
    // Glow effect
    ctx.globalAlpha = this.life * 0.2;
    ctx.fillStyle = `hsl(${this.hue}, 100%, 70%)`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Flow field particles
const particles = [];
const numStreams = 8;

for (let s = 0; s < numStreams; s++) {
  const startX = 200 + (s % 4) * 250;
  const startY = 100 + Math.floor(s / 4) * 500;
  const hue = 180 + s * 30;
  
  for (let i = 0; i < 80; i++) {
    particles.push(new Particle(
      startX + i * 3,
      startY + Math.sin(i * 0.1) * 50,
      hue + Math.random() * 40,
      2 + Math.random() * 4,
      0.5 + Math.random() * 1
    ));
  }
}

// Draw connections (constellation effect)
ctx.globalAlpha = 0.15;
ctx.strokeStyle = 'rgba(150, 180, 255, 0.3)';
ctx.lineWidth = 0.5;

for (let i = 0; i < particles.length; i++) {
  for (let j = i + 1; j < particles.length; j++) {
    const dx = particles[i].x - particles[j].x;
    const dy = particles[i].y - particles[j].y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist < 100) {
      ctx.globalAlpha = 0.1 * (1 - dist / 100);
      ctx.beginPath();
      ctx.moveTo(particles[i].x, particles[i].y);
      ctx.lineTo(particles[j].x, particles[j].y);
      ctx.stroke();
    }
  }
}

// Draw all particles
for (const p of particles) {
  for (let step = 0; step < 50; step++) {
    p.update();
    if (p.life > 0) {
      p.draw();
    }
  }
}

// Add central luminous orb
ctx.globalAlpha = 0.8;
const orbGradient = ctx.createRadialGradient(600, 400, 0, 600, 400, 150);
orbGradient.addColorStop(0, 'rgba(255, 220, 150, 0.9)');
orbGradient.addColorStop(0.3, 'rgba(255, 180, 100, 0.5)');
orbGradient.addColorStop(0.7, 'rgba(200, 100, 200, 0.2)');
orbGradient.addColorStop(1, 'rgba(100, 0, 150, 0)');
ctx.fillStyle = orbGradient;
ctx.beginPath();
ctx.arc(600, 400, 150, 0, Math.PI * 2);
ctx.fill();

// Star field
ctx.globalAlpha = 1;
for (let i = 0; i < 200; i++) {
  const x = Math.random() * 1200;
  const y = Math.random() * 800;
  const size = Math.random() * 2;
  const brightness = 0.3 + Math.random() * 0.7;
  
  ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI * 2);
  ctx.fill();
}

ctx.globalAlpha = 1;
</script>
</body>
</html>
